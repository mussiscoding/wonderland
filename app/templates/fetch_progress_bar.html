{% if progress.done and not progress.running %}
<script>window.location.href = '/events?city={{ city }}';</script>
{% else %}
<p class="progress-step">{{ progress.step }}</p>
{% if progress.total > 0 %}
<div class="progress-bar-track">
    <div class="progress-bar-fill" style="width: {{ (progress.current / progress.total * 100) | int }}%"></div>
</div>
<p class="progress-count">{{ progress.current }} / {{ progress.total }}</p>
{% endif %}
{% endif %}
