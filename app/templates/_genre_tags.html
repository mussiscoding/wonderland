<div class="genre-tags-wrap">
{% for g in (artist_genres or []) %}
{% set cat = genre_map.get(g.lower(), "unclassified") %}
<a href="/genre/{{ g | lower | urlencode }}" class="genre-tag {% if cat == 'dance' %}dance{% elif cat == 'adjacent' %}adjacent{% elif cat == 'other' %}other{% endif %}">{{ g }}</a>
{% endfor %}
</div>
